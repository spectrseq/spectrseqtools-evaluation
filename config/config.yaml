# Select solver name; allowed: "gurobi" (license required) or "cbc"
#solver: "gurobi"
solver: "cbc"

# Select parameter for fragmentation during data simulation
fragmentation_params:
  max_singletons: 15
  ghost_rate: 0.00
  rel_error_rate: 0.000005
  breakage_line: "c/y"
  noise_distribution: "uniform" # 'normal' or 'uniform'
  mass_5_prime: 555.1294  # Standard START tag
  mass_3_prime: 455.1491  # Standard END tag