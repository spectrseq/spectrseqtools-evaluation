simulation: # Sequence convention is 5' to 3'
  random: #Random sequence generation  with given length which is fragmented "n_fragments" times, the mutation rate for base-pairs is also given
    seed: 42325345
    mutation_rate: 0.1
    strata:
      - seq_len: 15
        n_fragments:
        - 30
      - seq_len: 20
        n_fragments:
        - 40
        - 100
        - 400
        - 800

  custom: #Hardcodes the sequences
    - seq: CUA104GU1A
      n_fragments:
        - 10
        - 20
        - 30
    - seq: CAGCAAAACGAUCAUAUAGAGAUCCGCAGU
      n_fragments:
        - 30
        - 100
        - 200
        - 400
    - seq: CAGCAAAACGAUCAUAUAGA
      n_fragments:
        - 30
        - 100
        - 200
        - 400
    - seq: GAUUGUCGUG #Shanice endlabelled test sequence
      n_fragments:
        - 20
        - 30
        - 50
        - 100
        - 200

fragmentation_params:
  max_n_parts: 3 # The maximum number of parts a fragment can be split into!
  rel_error_rate: 0.00002 #0.00001
  breakage_line: "c/y"
  fragmentation_process: "random" #'random' or 'exact': In 'random', the fragment is split into (1,max_n_parts) randomly, while in 'exact', the fragment is always split into 'max_n_parts' parts
  noise_distribution: "uniform" # 'normal' or 'uniform': The noise distribution for the fragmentation process
  mass_5_prime: 0.
  mass_3_prime: 0.

dev:
  envs:
    lionelmssq: /home/johannes/micromamba/envs/lionelmssq-dev